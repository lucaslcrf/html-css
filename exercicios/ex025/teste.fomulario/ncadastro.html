<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.ncadastro.css">
    <title>Document</title>
</head>
<body>
    <section class="content">
        <form action="" method="post">
            <h1>Criar conta</h1>
            <fieldset class="login">
                <legend>Login</legend>
            <div>
                <label>Endereço Email </label>
                <input type="email" name="email" id="iemail" placeholder="exemplo@email.com" required>
            </div>
            <div>
                <label>Confirmar email </label>
                <input type="email" name="email" id="iemail" placeholder="exemplo@email.com" required>
            </div>
            <div>
                <label>Senha </label>
                <input type="password" name="senha" id="senha" required>
            </div>
            </fieldset>
            <fieldset class="dpes">
                <legend>Dados Pessoais</legend>
                    <div>
                        <label for="nome">Nome: </label>
                        <input type="text" name="nome" id="inome">
                    </div>
                    <div>
                        <label for="cpf">CPF: </label>
                        <input type="tel"  minlength="11" maxlength="11" placeholder="___.___.___-__" required>
                    </div>
                    <div>
                        <label for="telefone">Telefone: </label>
                        <input type="tel" name="telefone" id="itelefone" placeholder="()*****-****" required>
                    </div>
            </fieldset>

            <div class="botao">
                <input type="reset" value="LIMPAR">
                <input type="submit" value="ENVIAR">
            </div>
        </form>
    </section>
</body>
</html>
